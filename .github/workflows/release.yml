# One-time manual setup required before this workflow will publish:
#
#   1. Make the repo public and remove "private": true from package.json (the
#      package is scoped @ajmarquez99/discord-cli with publishConfig.access:public).
#
#   2. Generate an npm Automation token (npmjs.com → Access Tokens → Generate
#      New Token → Automation) and add it as a repository secret named NPM_TOKEN
#      (GitHub repo → Settings → Secrets and variables → Actions).
#
#   3. Push a version tag matching vX.Y.Z whose version matches package.json:
#        git tag v0.3.0 && git push origin v0.3.0
#
# Until then this workflow is inert (it only triggers on v* tags), and a publish
# attempt will fail at `npm publish` while the package is private.

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run test:run
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
