# Auto-publish to npm via Trusted Publishing (OIDC) — no NPM_TOKEN, no secret.
#
# Pushing a tag matching v* runs this workflow, which mints a short-lived,
# per-workflow OIDC token (permissions: id-token: write) that npm exchanges for a
# one-time publish credential. Nothing long-lived is stored anywhere.
#
# The trust is configured once on npmjs.com (already done):
#   package @ajmarquez99/discord-cli -> Settings -> Trusted Publisher -> GitHub Actions
#   organization/user: AJMarquez99 | repository: discord-cli
#   workflow filename: release.yml | allowed action: npm publish
# That trust is keyed to THIS filename — renaming the file breaks publishing until
# you update the npm-side config to match.
#
# To release: bump the version, then push a matching tag:
#   git tag vX.Y.Z && git push origin vX.Y.Z
# See .ai/runbooks/releasing.md for the full procedure.

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest          # GitHub-hosted runner required (OIDC unsupported on self-hosted)
    permissions:
      id-token: write               # mint the OIDC token for trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'        # OIDC trusted publishing needs Node >= 22.14
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest   # ensure npm >= 11.5.1 (OIDC support)
      - run: npm ci
      - run: npm run test:run
      - run: npm publish --access public  # provenance auto-generated (public repo + public package)
